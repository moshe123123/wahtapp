<!DOCTYPE html>
<html dir="rtl" lang="he">
<head>
  <meta charset="UTF-8" />
  <style>
    body { font-family: sans-serif; width: 260px; padding: 12px; }
    label { display: block; margin-top: 8px; font-size: 13px; }
    input { width: 100%; box-sizing: border-box; padding: 6px; margin-top: 2px; }
    button { margin-top: 12px; width: 100%; padding: 8px; cursor: pointer; }
  </style>
</head>
<body>
  <h3>הגדרות גשר וואטסאפ</h3>
  <label>כתובת השרת (Render URL)
    <input id="serverUrl" placeholder="https://your-app.onrender.com" />
  </label>
  <label>מפתח API
    <input id="apiKey" type="password" placeholder="API_KEY מהשרת" />
  </label>
  <button id="save">שמור</button>
  <div id="status" style="margin-top:8px;font-size:12px;color:green;"></div>
  <script src="popup.js"></script>
</body>
</html>
