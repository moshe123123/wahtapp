<!DOCTYPE html>
<html dir="rtl" lang="he">
<head>
<meta charset="UTF-8" />
<title>WA Bridge</title>
<style>
  * { box-sizing: border-box; }
  body { margin: 0; font-family: Arial, sans-serif; background: #f0f0f0; display: flex; height: 100vh; }

  #settingsScreen { margin: auto; background: #fff; padding: 24px; border-radius: 10px; width: 360px; box-shadow: 0 4px 20px rgba(0,0,0,.15); }
  #settingsScreen h2 { color: #075E54; margin-top: 0; }
  #settingsScreen label { display: block; font-size: 13px; margin-top: 10px; }
  #settingsScreen input { width: 100%; padding: 8px; margin-top: 4px; border: 1px solid #ccc; border-radius: 4px; }
  #settingsScreen button { margin-top: 16px; width: 100%; padding: 10px; background: #25D366; color: #fff; border: none; border-radius: 6px; cursor: pointer; font-size: 14px; }

  #appScreen { display: none; flex: 1; }
  #sidebar { width: 260px; background: #fafafa; border-left: 1px solid #ddd; display: flex; flex-direction: column; }
  #sidebar .header { background: #075E54; color: #fff; padding: 14px; font-weight: bold; display:flex; justify-content:space-between; align-items:center; }
  #sidebar .header span.gear { cursor: pointer; margin-inline-start: 10px; }
  #newChat { display: flex; flex-direction: column; gap: 5px; padding: 8px; border-bottom: 1px solid #eee; }
  #newChat input { width: 100%; box-sizing: border-box; padding: 6px; font-size: 12px; border: 1px solid #ddd; border-radius: 4px; }
  #newChatButtons { display: flex; gap: 4px; }
  #newChat button { background: #25D366; color: #fff; border: none; border-radius: 4px; padding: 6px 2px; cursor: pointer;
    flex: 1; font-size: 10px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; min-width: 0; }
  #startTemplate { background: #128C4A !important; }
  #getLink { background: #1A73E8 !important; }
  #sendTestConversation { background: #E67E22 !important; }
  #contactList { flex: 1; overflow-y: auto; }
  .contact { display: flex; align-items: center; gap: 8px; padding: 10px; cursor: pointer; border-bottom: 1px solid #f0f0f0; }
  .contact-delete { opacity: 0; background: none; border: none; color: #c0392b; font-size: 14px; cursor: pointer;
    padding: 4px 6px; border-radius: 4px; transition: opacity .15s; flex-shrink: 0; }
  .contact:hover .contact-delete { opacity: 1; }
  .contact-delete:hover { background: #fdecea; }
  .contact:hover { background: #eee; }
  .contact.active { background: #dcf3e6; }
  .avatar { width: 34px; height: 34px; border-radius: 17px; background: #128C4A; color: #fff; display: flex; align-items: center; justify-content: center; font-size: 12px; flex-shrink: 0; }
  .cinfo { flex: 1; min-width: 0; }
  .cnum { font-size: 13px; font-weight: bold; }
  .clast { font-size: 11px; color: #888; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

  #chatArea { flex: 1; display: flex; flex-direction: column; }
  #chatHeader { padding: 14px; border-bottom: 1px solid #ddd; font-weight: bold; background: #fff; }
  #messages { flex: 1; overflow-y: auto; padding: 16px; background: #e5ddd5; }
  .msg { display: flex; flex-direction: column; margin-bottom: 10px; max-width: 60%; }
  .msg.in { align-items: flex-start; margin-left: auto; }
  .msg.out { align-items: flex-end; margin-right: auto; }
  .bubble { padding: 8px 12px; border-radius: 8px; font-size: 14px; white-space: pre-wrap; word-break: break-word; }
  .msg.in .bubble { background: #fff; }
  .msg.out .bubble { background: #DCF8C6; }
  .mtime { font-size: 10px; color: #999; margin-top: 3px; }
  .tick { font-size: 12px; }
  .tick-sent, .tick-delivered { color: #999; }
  .tick-read { color: #34B7F1; }
  .tick-failed { color: #c0392b; }
  #inputRow { display: flex; border-top: 1px solid #ddd; background: #fff; position: relative; }
  #inputRow input { flex: 1; border: none; padding: 14px; font-size: 14px; outline: none; }
  #inputRow button { background: #25D366; color: #fff; border: none; padding: 0 24px; cursor: pointer; font-size: 14px; }
  #emojiBtn { background: #fff !important; color: #000 !important; font-size: 20px !important; padding: 0 12px !important; }
  #attachBtn { background: #fff !important; color: #000 !important; font-size: 20px !important; padding: 0 12px !important; }
  #attachBtn:disabled, #emojiBtn:disabled { opacity: .4; }
  #emojiPanel { display: none; position: absolute; bottom: 54px; right: 8px; width: 260px; max-height: 220px; overflow-y: auto;
    background: #fff; border: 1px solid #ddd; border-radius: 8px; box-shadow: 0 4px 16px rgba(0,0,0,.15); padding: 8px;
    grid-template-columns: repeat(8, 1fr); gap: 2px; }
  #emojiPanel.open { display: grid; }
  #emojiPanel span { cursor: pointer; font-size: 18px; text-align: center; padding: 4px; border-radius: 4px; }
  #emojiPanel span:hover { background: #f0f0f0; }
  #empty { margin: auto; color: #888; }

  /* מדיה בתוך בועות ההודעה */
  .media-img { max-width: 220px; max-height: 220px; border-radius: 6px; display: block; cursor: pointer; }
  .media-video { max-width: 240px; max-height: 240px; border-radius: 6px; display: block; }
  audio { max-width: 230px; }
  .caption { font-size: 13px; margin-top: 4px; white-space: pre-wrap; }
  .media-load-btn { background: #f0f0f0; border: 1px solid #ddd; border-radius: 6px; padding: 10px 14px;
    cursor: pointer; font-size: 13px; display: block; }
  .media-load-btn:disabled { opacity: .6; cursor: default; }
  .doc-link { display: inline-block; padding: 8px 12px; background: #f0f0f0; border-radius: 6px; text-decoration: none; color: #075E54; font-size: 13px; }

  /* מודל הגדרות אפליקציה */
  #appSettingsOverlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.4); align-items: center; justify-content: center; z-index: 50; }
  #appSettingsOverlay.open { display: flex; }
  #appSettingsModal { background: #fff; width: 380px; max-height: 80vh; overflow-y: auto; border-radius: 10px; padding: 22px; box-shadow: 0 8px 30px rgba(0,0,0,.25); }
  #appSettingsModal h2 { margin-top: 0; color: #075E54; }
  #appSettingsModal h3 { font-size: 13px; color: #555; margin: 18px 0 8px; border-top: 1px solid #eee; padding-top: 14px; }
  .pref-row { display: flex; align-items: center; gap: 8px; font-size: 13px; margin: 8px 0; cursor: pointer; }
  .contact-name-row { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; }
  .contact-name-row .cnr-number { font-size: 12px; color: #888; width: 110px; flex-shrink: 0; }
  .contact-name-row input { flex: 1; padding: 6px; font-size: 13px; border: 1px solid #ccc; border-radius: 4px; }
  #appSettingsModal button { padding: 10px; border: none; border-radius: 6px; cursor: pointer; font-size: 13px; flex: 1; }
  #saveAppSettings { background: #25D366; color: #fff; }
  .secondary { background: #eee; color: #333; }
  #versionRow { display: flex; align-items: center; justify-content: space-between; font-size: 12px; color: #555; }
  #versionRow button { flex: none !important; padding: 6px 10px !important; font-size: 11px !important; }
  #updateStatus { font-size: 12px; color: #128C4A; margin-top: 6px; min-height: 16px; }

  /* מצב כהה */
  body.dark { background: #111; }
  body.dark #sidebar { background: #1e1e1e; border-color: #333; }
  body.dark #contactList .contact { border-color: #2a2a2a; color: #eee; }
  body.dark #contactList .contact:hover { background: #2a2a2a; }
  body.dark #contactList .contact.active { background: #234; }
  body.dark #chatHeader { background: #1e1e1e; color: #eee; border-color: #333; }
  body.dark #messages { background: #0b141a; }
  body.dark .msg.in .bubble { background: #1f2c34; color: #eee; }
  body.dark .msg.out .bubble { background: #056162; color: #eee; }
  body.dark #inputRow { background: #1e1e1e; border-color: #333; }
  body.dark #inputRow input { background: #1e1e1e; color: #eee; }
  body.dark #appSettingsModal { background: #222; color: #eee; }
  body.dark #appSettingsModal h3 { border-color: #333; color: #aaa; }
  body.dark .contact-name-row input { background: #333; color: #eee; border-color: #444; }
  body.dark #versionRow { color: #aaa; }
  body.dark .secondary { background: #333; color: #eee; }
</style>
</head>
<body>

  <div id="settingsScreen">
    <h2>⚙️ הגדרות חיבור</h2>
    <label>כתובת ה-Apps Script (URL)
      <input id="scriptUrl" placeholder="https://script.google.com/macros/s/.../exec" />
    </label>
    <label>מפתח API
      <input id="apiKey" type="password" />
    </label>
    <label>קידומת בינלאומית ברירת מחדל (להמרת מספרים שמתחילים ב-0)
      <select id="defaultPrefix">
        <option value="972">972 - ישראל</option>
        <option value="1">1 - ארה"ב/קנדה</option>
        <option value="44">44 - בריטניה</option>
        <option value="none">בלי המרה - הזן תמיד בפורמט מלא</option>
      </select>
    </label>
    <button id="saveSettings">שמור והתחבר</button>
    <div id="settingsResult" style="margin-top:10px;font-size:12px;color:#c0392b;"></div>
  </div>

  <div id="appScreen">
    <div id="sidebar">
      <div class="header">
        <span>💬 WA Bridge</span>
        <span>
          <span class="gear" id="openAppSettings" title="הגדרות אפליקציה">🛠️</span>
          <span class="gear" id="openSettings" title="הגדרות חיבור">⚙️</span>
        </span>
      </div>
      <div id="newChat">
        <input id="newNumber" placeholder="0548477910 או 972548477910" />
        <div id="newChatButtons">
          <button id="startNew" title="שיחה רגילה (רק אם כבר כתבו אליך ב-24 שעות)">💬 התחל</button>
          <button id="startTemplate" title="למספר שלא כתב אליך ב-24 השעות האחרונות (תבנית בתשלום)">🚀 פתח</button>
        </div>
        <div id="newChatButtons">
          <button id="getLink" title="יוצר קישור מוכן שאתה שולח בעצמך (מייל/SMS/בעל פה) - חינמי, לא נראה חשוד">🔗 קישור</button>
          <button id="sendTestConversation" title="יזום שיחה חינמי דרך מספר הבדיקה של מטא - הנמען חייב להיות מאומת מראש">🆓 חינם</button>
        </div>
      </div>
      <div id="contactList"></div>
    </div>
    <div id="chatArea">
      <div id="chatHeader">בחר שיחה, או התחל חדשה</div>
      <div id="messages"><div id="empty">אין שיחה נבחרת</div></div>
      <div id="inputRow">
        <div id="emojiPanel"></div>
        <input type="file" id="fileInput" accept="image/*,video/*,audio/*,application/pdf" style="display:none" />
        <button id="attachBtn" disabled>📎</button>
        <button id="emojiBtn" disabled>😊</button>
        <input id="msgInput" placeholder="הקלד הודעה..." disabled />
        <button id="sendBtn" disabled>שלח</button>
      </div>
    </div>
  </div>

  <div id="appSettingsOverlay">
    <div id="appSettingsModal">
      <h2>🛠️ הגדרות אפליקציה</h2>

      <h3>העדפות</h3>
      <label class="pref-row"><input type="checkbox" id="prefReadReceipts" /> שלח אישורי קריאה (וי כחולה) כשפותחים שיחה</label>
      <label class="pref-row"><input type="checkbox" id="prefSound" /> צליל התראה בהודעה נכנסת חדשה</label>
      <label class="pref-row"><input type="checkbox" id="prefDark" /> מצב כהה</label>

      <h3>שמות אנשי קשר</h3>
      <div id="contactNamesList"></div>

      <h3>גרסה ועדכונים</h3>
      <div id="versionRow">
        <span id="versionText">גרסה: טוען...</span>
        <button id="checkUpdateBtn" class="secondary">🔄 בדוק עדכון</button>
      </div>
      <div id="updateStatus"></div>

      <div style="display:flex; gap:8px; margin-top:16px;">
        <button id="saveAppSettings">שמור וסגור</button>
        <button id="closeAppSettings" class="secondary">סגור בלי לשמור</button>
      </div>
    </div>
  </div>

<script src="app.js"></script>
</body>
</html>
